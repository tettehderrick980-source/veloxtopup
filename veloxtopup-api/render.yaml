# Render Blueprint for VeloxTopUp API
# This file enables declarative deployment to Render
# Learn more: https://render.com/docs/blueprints

services:
  - type: web
    name: veloxtopup-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    
    # Node version specification
    nodeVersion: "20"
    
    # Environment variables for production
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: API_VERSION
        value: v1
      
      # Supabase - Replace with your actual values in Render dashboard
      # These are example values - update in Render dashboard for security
      - key: SUPABASE_URL
        value: https://your-project.supabase.co
      - key: SUPABASE_ANON_KEY
        value: your_supabase_anon_key_here
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: your_service_role_key_here
        sync: false  # Don't sync this value - it's sensitive
      
      # JWT - Generate a strong random string for production
      - key: JWT_SECRET
        value: change-this-to-a-strong-random-secret-in-production
        sync: false
      
      # Paystack - Update with your actual keys in Render dashboard
      - key: PAYSTACK_SECRET_KEY
        value: sk_live_your_paystack_key
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        value: your_paystack_webhook_secret
        sync: false
      
      # GhDataConnect API
      - key: GH_DATACONNECT_API_KEY
        value: your_gh_dataconnect_api_key
        sync: false
      - key: GH_DATACONNECT_API_URL
        value: https://ghdataconnect.com/api
      
      # Email/SMTP Configuration
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: your_email@gmail.com
      - key: SMTP_PASS
        value: your_app_password
        sync: false
      - key: SMTP_FROM
        value: noreply@veloxtopup.com
      
      # Rate Limiting (15 min window, 100 requests)
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      
      # CORS - Update to your production frontend URL
      - key: CORS_ORIGIN
        value: https://veloxtopup.shop
      
      # Logging
      - key: LOG_LEVEL
        value: error
      
      # Redis (if using Bull queue - optional for Render)
      # Render provides Redis as an add-on if needed
      - key: REDIS_URL
        value: ""

# Optional: Add Redis for Bull queue if needed
# databases:
#   - name: veloxtopup-redis
#     type: redis
#     plan: free